<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Open Graph / social sharing image -->
  <rect width="1200" height="630" fill="#fafaf8"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e5e5" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#1a4b8c"/>

  <!-- Icon mark -->
  <rect x="100" y="200" width="80" height="80" rx="18" fill="#1a4b8c"/>
  <path d="M118 214h30l10.5 10.5v42a2.5 2.5 0 0 1-2.5 2.5h-38a2.5 2.5 0 0 1-2.5-2.5v-50a2.5 2.5 0 0 1 2.5-2.5z" fill="#ffffff" opacity="0.95"/>
  <path d="M148 214l10.5 10.5h-8a2.5 2.5 0 0 1-2.5-2.5V214z" fill="#c8d8ed"/>
  <rect x="123" y="233" width="25" height="3" rx="1.5" fill="#1a4b8c" opacity="0.7"/>
  <rect x="123" y="240" width="18" height="3" rx="1.5" fill="#1a4b8c" opacity="0.5"/>
  <rect x="123" y="247" width="13" height="3" rx="1.5" fill="#1a4b8c" opacity="0.3"/>

  <!-- Title -->
  <text x="200" y="238" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">arXiv Daily Digest</text>
  <text x="200" y="268" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#555555" letter-spacing="0.5">RANKED DAILY ARXIV FOR ML RESEARCHERS</text>

  <!-- Feature cards -->
  <rect x="100" y="340" width="300" height="120" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="130" y="386" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Personalized Ranking</text>
  <text x="130" y="412" font-family="'Charter', Georgia, serif" font-size="14" fill="#555555">Papers scored by your interests</text>

  <rect x="430" y="340" width="300" height="120" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="460" y="386" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">ML Taxonomy</text>
  <text x="460" y="412" font-family="'Charter', Georgia, serif" font-size="14" fill="#555555">14 research areas, 19 subtopics</text>

  <rect x="760" y="340" width="300" height="120" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="790" y="386" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Daily Discovery</text>
  <text x="790" y="412" font-family="'Charter', Georgia, serif" font-size="14" fill="#555555">Fresh papers every morning</text>

  <!-- Bottom accent -->
  <rect y="620" width="1200" height="10" fill="#1a4b8c"/>
</svg>
